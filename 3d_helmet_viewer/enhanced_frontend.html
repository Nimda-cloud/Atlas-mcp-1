<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas 3D Helmet - Enhanced Frontend</title>
    
    <!-- Use local font fallback -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');
    </style>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: #000000;
            color: #00ff41;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* 3D Canvas - Base Layer */
        #canvas3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background: #000000;
        }

        /* Chat Panel - Left Transparent Overlay */
        .chat-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 350px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15px;
            font-size: 13px;
            line-height: 1.5;
        }

        .message {
            margin-bottom: 15px;
            max-width: 85%;
            word-wrap: break-word;
        }

        .message.user {
            margin-left: 30px;
            text-align: left;
        }

        .message.atlas {
            margin-right: 30px;
            text-align: left;
        }

        .message-text {
            color: #cccccc;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.1);
        }

        .message.user .message-text {
            background: rgba(0, 150, 255, 0.05);
            border-color: rgba(0, 150, 255, 0.2);
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid rgba(0, 255, 65, 0.3);
        }

        .chat-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(0, 255, 65, 0.5);
            color: #00ff41;
            padding: 12px;
            font-family: inherit;
            font-size: 13px;
            resize: none;
            border-radius: 6px;
            outline: none;
        }

        .chat-input:focus {
            border-color: #00ff41;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.3);
        }

        /* Logs Panel - Right Transparent Overlay */
        .logs-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 400px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
        }

        .logs-header {
            padding: 15px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            background: rgba(0, 255, 65, 0.05);
        }

        .logs-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 11px;
            line-height: 1.3;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 6px 8px;
            border-left: 2px solid rgba(0, 255, 65, 0.3);
            background: rgba(0, 255, 65, 0.02);
            border-radius: 3px;
        }

        .log-timestamp {
            color: #666666;
            font-size: 10px;
        }

        .log-level {
            color: #00ff41;
            font-weight: 500;
            display: inline;
            margin-right: 5px;
        }

        .log-message {
            color: #cccccc;
            display: inline;
        }

        /* Voice Controls */
        .voice-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 10px;
        }

        .voice-btn {
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid rgba(0, 255, 65, 0.5);
            color: #00ff41;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .voice-btn:hover {
            background: rgba(0, 255, 65, 0.2);
            border-color: #00ff41;
        }

        .voice-btn.active {
            background: rgba(0, 255, 65, 0.3);
            border-color: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        /* Status Indicator */
        .status-indicator {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 255, 65, 0.3);
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 12px;
            color: #cccccc;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 65, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 65, 0.5);
        }
    </style>
</head>
<body>
    <!-- Status Indicator -->
    <div class="status-indicator" id="statusIndicator">
        Atlas System Ready
    </div>

    <!-- 3D Canvas (Base Layer) -->
    <canvas id="canvas3d"></canvas>

    <!-- Chat Panel (Left Overlay) -->
    <div class="chat-panel">
        <div class="chat-messages" id="chatMessages">
            <div class="message atlas">
                <div class="message-text">
                    🤖 Привіт! Я Атлас. Готовий до спілкування. Використовуй голосові команди або пиши повідомлення.
                </div>
            </div>
        </div>
        <div class="chat-input-area">
            <textarea 
                id="chatInput" 
                class="chat-input"
                placeholder="Введіть повідомлення або використайте голосові команди..."
                rows="2"
            ></textarea>
        </div>
    </div>

    <!-- Logs Panel (Right Overlay) -->
    <div class="logs-panel">
        <div class="logs-header">
            📊 System Logs (Full Stack)
        </div>
        <div class="logs-content" id="logsContent">
            <!-- Logs will be populated here -->
        </div>
    </div>

    <!-- Voice Controls -->
    <div class="voice-controls">
        <button class="voice-btn" id="voiceBtn">🎤 Voice Input</button>
        <button class="voice-btn" id="muteBtn">🔊 TTS On</button>
    </div>

    <script>
        class AtlasEnhancedFrontend {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.helmet = null;
                this.mixer = null;
                this.clock = new THREE.Clock();
                
                // Eye tracking
                this.mouseX = 0;
                this.mouseY = 0;
                this.lookAtTarget = new THREE.Vector3(0, 0, 0);
                this.currentLook = new THREE.Vector3(0, 0, 0);
                
                // State management
                this.isListening = false;
                this.isSpeaking = false;
                this.ttsEnabled = true;
                this.logIntensity = 0;
                this.chatActivity = false;
                
                // Initialize
                this.initThreeJS();
                this.loadHelmetModel();
                this.initEventListeners();
                this.startLogSimulation();
                this.animate();
                
                console.log("Atlas Enhanced Frontend initialized");
            }

            initThreeJS() {
                const canvas = document.getElementById('canvas3d');
                
                // Scene
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x000000);
                
                // Camera
                this.camera = new THREE.PerspectiveCamera(
                    75, 
                    window.innerWidth / window.innerHeight, 
                    0.1, 
                    1000
                );
                this.camera.position.set(0, 0, 3);
                
                // Renderer
                this.renderer = new THREE.WebGLRenderer({ 
                    canvas: canvas, 
                    antialias: true,
                    alpha: true 
                });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                
                // Lighting
                const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
                this.scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0x00ff41, 0.8);
                directionalLight.position.set(2, 2, 5);
                directionalLight.castShadow = true;
                this.scene.add(directionalLight);
                
                const pointLight = new THREE.PointLight(0x00ff41, 0.5, 10);
                pointLight.position.set(-2, 1, 2);
                this.scene.add(pointLight);
            }

            loadHelmetModel() {
                const loader = new THREE.GLTFLoader();
                loader.load(
                    'DamagedHelmet.glb',
                    (gltf) => {
                        this.helmet = gltf.scene;
                        this.helmet.scale.set(2, 2, 2);
                        this.helmet.position.set(0, -0.5, 0);
                        
                        // Enable shadows
                        this.helmet.traverse((child) => {
                            if (child.isMesh) {
                                child.castShadow = true;
                                child.receiveShadow = true;
                            }
                        });
                        
                        this.scene.add(this.helmet);
                        
                        // Setup animations if available
                        if (gltf.animations && gltf.animations.length > 0) {
                            this.mixer = new THREE.AnimationMixer(this.helmet);
                            gltf.animations.forEach((clip) => {
                                this.mixer.clipAction(clip).play();
                            });
                        }
                        
                        console.log("Helmet model loaded successfully");
                        this.updateStatus("Helmet Model Loaded");
                    },
                    (progress) => {
                        console.log('Loading progress:', progress);
                    },
                    (error) => {
                        console.error('Error loading helmet model:', error);
                        this.updateStatus("Error: Model Loading Failed");
                    }
                );
            }

            initEventListeners() {
                // Mouse tracking for helmet gaze
                document.addEventListener('mousemove', (event) => {
                    this.mouseX = (event.clientX / window.innerWidth) * 2 - 1;
                    this.mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
                    this.updateHelmetGaze();
                });

                // Chat input
                const chatInput = document.getElementById('chatInput');
                chatInput.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter' && !event.shiftKey) {
                        event.preventDefault();
                        this.sendChatMessage();
                    }
                });

                chatInput.addEventListener('focus', () => {
                    this.chatActivity = true;
                    this.updateHelmetGaze();
                });

                chatInput.addEventListener('blur', () => {
                    this.chatActivity = false;
                    this.updateHelmetGaze();
                });

                // Voice controls
                document.getElementById('voiceBtn').addEventListener('click', () => {
                    this.toggleVoiceInput();
                });

                document.getElementById('muteBtn').addEventListener('click', () => {
                    this.toggleTTS();
                });

                // Window resize
                window.addEventListener('resize', () => {
                    this.onWindowResize();
                });
            }

            updateHelmetGaze() {
                if (!this.helmet) return;

                let targetX = 0, targetY = 0, targetZ = 0;

                if (this.chatActivity) {
                    // Look towards chat area (left)
                    targetX = -0.8;
                    targetY = -0.3;
                } else if (this.logIntensity > 0.5) {
                    // Look towards logs (right) if logs are active
                    targetX = 0.8;
                    targetY = 0.2;
                } else {
                    // Follow mouse movement
                    targetX = this.mouseX * 0.5;
                    targetY = this.mouseY * 0.3;
                }

                this.lookAtTarget.set(targetX, targetY, targetZ);
            }

            sendChatMessage() {
                const chatInput = document.getElementById('chatInput');
                const message = chatInput.value.trim();
                
                if (!message) return;

                // Add user message
                this.addChatMessage('user', message);
                chatInput.value = '';

                // Simulate Atlas response
                setTimeout(() => {
                    this.processAtlasResponse(message);
                }, 800);
            }

            addChatMessage(sender, text) {
                const messagesContainer = document.getElementById('chatMessages');
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}`;
                
                const textDiv = document.createElement('div');
                textDiv.className = 'message-text';
                textDiv.textContent = text;
                
                messageDiv.appendChild(textDiv);
                messagesContainer.appendChild(messageDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;

                // Update helmet activity
                this.chatActivity = true;
                setTimeout(() => {
                    this.chatActivity = false;
                    this.updateHelmetGaze();
                }, 2000);
            }

            processAtlasResponse(userMessage) {
                // Simulate Atlas thinking and response
                const responses = [
                    `Розумію вашу вимогу: "${userMessage}". Обробляю...`,
                    `Цікаво! Ви сказали: "${userMessage}". Дозвольте мені проаналізувати.`,
                    `Зрозуміло. Щодо "${userMessage}" - я вже працюю над цим.`,
                    `Дякую за повідомлення: "${userMessage}". Виконую аналіз системи.`,
                ];
                
                const response = responses[Math.floor(Math.random() * responses.length)];
                this.addChatMessage('atlas', response);
                
                // Trigger TTS if enabled
                if (this.ttsEnabled) {
                    this.speakText(response);
                }
            }

            speakText(text) {
                if (!this.ttsEnabled) return;
                
                // Use Web Speech API as fallback
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'uk-UA';
                    utterance.rate = 0.9;
                    utterance.pitch = 1.1;
                    
                    utterance.onstart = () => {
                        this.isSpeaking = true;
                        this.updateStatus("Atlas Speaking...");
                        this.animateHelmetSpeaking(true);
                    };
                    
                    utterance.onend = () => {
                        this.isSpeaking = false;
                        this.updateStatus("Atlas System Ready");
                        this.animateHelmetSpeaking(false);
                    };
                    
                    speechSynthesis.speak(utterance);
                }
                
                // TODO: Integrate with TTS MCP service
                this.callTTSService(text);
            }

            async callTTSService(text) {
                try {
                    // Call the TTS MCP service
                    const response = await fetch('/api/tts/speak', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            text: text,
                            voice: 'uk:Dmytro',
                            agent: 'atlas'
                        })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        console.log('TTS Service response:', data);
                        // Play the audio from the TTS service
                        if (data.url) {
                            const audio = new Audio(data.url);
                            audio.play();
                        }
                    }
                } catch (error) {
                    console.log('TTS Service not available, using browser TTS');
                }
            }

            animateHelmetSpeaking(isSpeaking) {
                if (!this.helmet) return;
                
                if (isSpeaking) {
                    // Add subtle movement during speech
                    const speakingAnimation = () => {
                        if (this.isSpeaking) {
                            this.helmet.rotation.y += Math.sin(Date.now() * 0.01) * 0.02;
                            this.helmet.rotation.x += Math.cos(Date.now() * 0.015) * 0.01;
                            requestAnimationFrame(speakingAnimation);
                        }
                    };
                    speakingAnimation();
                }
            }

            toggleVoiceInput() {
                const voiceBtn = document.getElementById('voiceBtn');
                
                if (this.isListening) {
                    this.stopVoiceInput();
                } else {
                    this.startVoiceInput();
                }
            }

            startVoiceInput() {
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    alert('Speech recognition не підтримується у вашому браузері');
                    return;
                }

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                this.recognition = new SpeechRecognition();
                this.recognition.lang = 'uk-UA';
                this.recognition.interimResults = true;
                this.recognition.continuous = false;

                this.recognition.onstart = () => {
                    this.isListening = true;
                    document.getElementById('voiceBtn').classList.add('active');
                    document.getElementById('voiceBtn').textContent = '🛑 Stop';
                    this.updateStatus("Listening...");
                };

                this.recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    if (event.results[0].isFinal) {
                        document.getElementById('chatInput').value = transcript;
                        this.sendChatMessage();
                    }
                };

                this.recognition.onend = () => {
                    this.stopVoiceInput();
                };

                this.recognition.onerror = (event) => {
                    console.error('Speech recognition error:', event.error);
                    this.stopVoiceInput();
                };

                this.recognition.start();
            }

            stopVoiceInput() {
                if (this.recognition) {
                    this.recognition.stop();
                }
                
                this.isListening = false;
                document.getElementById('voiceBtn').classList.remove('active');
                document.getElementById('voiceBtn').textContent = '🎤 Voice Input';
                this.updateStatus("Atlas System Ready");
            }

            toggleTTS() {
                this.ttsEnabled = !this.ttsEnabled;
                const muteBtn = document.getElementById('muteBtn');
                muteBtn.textContent = this.ttsEnabled ? '🔊 TTS On' : '🔇 TTS Off';
                muteBtn.classList.toggle('active', !this.ttsEnabled);
            }

            updateStatus(status) {
                document.getElementById('statusIndicator').textContent = status;
            }

            startLogSimulation() {
                const logSources = [
                    'atlas-core',
                    'mcp-tts',
                    'mcp-automation',
                    'redis',
                    'qdrant',
                    'prometheus'
                ];

                const logMessages = [
                    'WebSocket connection established',
                    'Memory usage: 45.2 MB',
                    'GPU temperature: 62°C',
                    'Network latency: 12ms',
                    'Cache cleared successfully',
                    'Texture compression enabled',
                    'Lighting calculations optimized',
                    'TTS synthesis completed',
                    'Voice recognition active',
                    'Database query executed in 15ms',
                    'Container health check: OK',
                    'Model inference time: 234ms'
                ];

                const addRandomLog = () => {
                    const source = logSources[Math.floor(Math.random() * logSources.length)];
                    const message = logMessages[Math.floor(Math.random() * logMessages.length)];
                    const levels = ['INFO', 'DEBUG', 'SUCCESS', 'WARNING'];
                    const level = levels[Math.floor(Math.random() * levels.length)];
                    
                    this.addLogEntry(level, `[${source}] ${message}`);
                };

                // Add logs at random intervals (1-8 seconds)
                const scheduleNextLog = () => {
                    const delay = Math.random() * 7000 + 1000;
                    setTimeout(() => {
                        addRandomLog();
                        scheduleNextLog();
                    }, delay);
                };

                scheduleNextLog();

                // Simulate log intensity bursts
                setInterval(() => {
                    if (Math.random() < 0.3) { // 30% chance
                        this.logIntensity = 1.0;
                        // Add burst of logs
                        for (let i = 0; i < 5; i++) {
                            setTimeout(addRandomLog, i * 200);
                        }
                        // Fade intensity
                        setTimeout(() => {
                            this.logIntensity = 0;
                            this.updateHelmetGaze();
                        }, 3000);
                    }
                }, 10000); // Check every 10 seconds
            }

            addLogEntry(level, message) {
                const logsContainer = document.getElementById('logsContent');
                const logDiv = document.createElement('div');
                logDiv.className = 'log-entry';
                
                const timestamp = new Date().toLocaleString('uk-UA');
                logDiv.innerHTML = `
                    <div class="log-timestamp">${timestamp}</div>
                    <div class="log-level">[${level}]</div>
                    <div class="log-message">${message}</div>
                `;
                
                logsContainer.appendChild(logDiv);
                logsContainer.scrollTop = logsContainer.scrollHeight;

                // Keep only last 100 logs
                const logs = logsContainer.children;
                if (logs.length > 100) {
                    logsContainer.removeChild(logs[0]);
                }

                // Update log intensity for helmet gaze
                this.logIntensity = Math.min(this.logIntensity + 0.1, 1.0);
                this.updateHelmetGaze();
                
                // Fade intensity
                setTimeout(() => {
                    this.logIntensity = Math.max(this.logIntensity - 0.1, 0);
                    this.updateHelmetGaze();
                }, 1000);
            }

            animate() {
                requestAnimationFrame(() => this.animate());

                const delta = this.clock.getDelta();

                // Update animations
                if (this.mixer) {
                    this.mixer.update(delta);
                }

                // Smooth helmet movement
                if (this.helmet) {
                    // Smooth gaze following
                    this.currentLook.lerp(this.lookAtTarget, 0.05);
                    
                    // Apply rotation based on gaze
                    this.helmet.rotation.y = this.currentLook.x * 0.5;
                    this.helmet.rotation.x = this.currentLook.y * 0.3;
                    
                    // Add subtle idle animation
                    if (!this.isSpeaking && !this.chatActivity && this.logIntensity < 0.1) {
                        this.helmet.rotation.z = Math.sin(Date.now() * 0.001) * 0.05;
                        this.helmet.position.y = -0.5 + Math.sin(Date.now() * 0.0008) * 0.02;
                    }
                }

                this.renderer.render(this.scene, this.camera);
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }

        // Initialize the application when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new AtlasEnhancedFrontend();
        });
    </script>
</body>
</html>
