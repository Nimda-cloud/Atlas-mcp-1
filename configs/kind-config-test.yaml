# Kind configuration for Atlas MCP testing (without port conflicts)
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: atlas-mcp-test
networking:
  # Enable host network access
  apiServerAddress: "0.0.0.0"
  apiServerPort: 6444  # Alternative port to avoid conflicts
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  - containerPort: 80
    hostPort: 8081
    protocol: TCP
  - containerPort: 443
    hostPort: 8443
    protocol: TCP
  - containerPort: 30000
    hostPort: 30100
    protocol: TCP
  - containerPort: 30001
    hostPort: 30101
    protocol: TCP
  - containerPort: 30002
    hostPort: 30102
    protocol: TCP
  # NOTE: Removed Ollama port mapping to avoid conflicts
  # Use host.docker.internal:11434 from within pods
- role: worker
  labels:
    tier: worker
