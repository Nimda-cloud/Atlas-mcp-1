name: Post-merge local verification (macOS self-hosted)

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  local_macos:
    name: Local macOS verification
    # Your local runner must have labels self-hosted and macOS
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps (best effort)
        run: |
          python -m pip install -U pip
          echo "Installing dependencies on macOS runner..."
          if [ -f requirements.txt ]; then
            echo "Attempting full requirements.txt installation..."
            if timeout 300 pip install -r requirements.txt; then
              echo "Full requirements installation successful"
            else
              echo "Full requirements failed, trying core packages..."
              pip install ollama openai fastapi uvicorn aiohttp psutil pydantic python-dotenv pyyaml click pytest pytest-asyncio || true
            fi
          else
            echo "No requirements.txt, installing basic test packages..."
            pip install pytest pytest-asyncio || true
          fi

      - name: Prepare logs dir
        run: mkdir -p logs

      - name: Quick tests
        run: |
          if [ -d tests ]; then
            pytest -q || true
          else
            echo "No tests; skip"
          fi

      - name: Docker compose sanity (optional)
        if: hashFiles('docker-compose.yml') != ''
        run: docker compose -f docker-compose.yml config

      - name: "Compose up (profiles: mcp + monitoring)"
        if: hashFiles('docker-compose.yml') != ''
        run: |
          # Build and start stack; profiles are optional if not defined
          echo "Checking Docker Compose availability..."
          if ! docker compose version >/dev/null 2>&1; then
            echo "Docker Compose not available, skipping container setup"
            exit 0
          fi
          
          echo "Starting Docker Compose stack..."
          # Try with profiles first, fall back to basic setup
          if docker compose --profile mcp --profile monitoring up -d --build 2>/dev/null; then
            echo "Started with mcp and monitoring profiles"
          elif docker compose --profile mcp up -d --build 2>/dev/null; then
            echo "Started with mcp profile only"
          elif docker compose up -d --build 2>/dev/null; then
            echo "Started with basic profile"
          else
            echo "Docker Compose failed to start, continuing without containers"
            exit 0
          fi

      - name: Wait for services health
        if: hashFiles('docker-compose.yml') != ''
        run: |
          mkdir -p logs
          echo "Checking service health..."
          
          # Define health check function with better error handling
          check() { 
            name=$1; url=$2; max=${3:-60}; i=0
            echo "Waiting for $name at $url (max ${max}s)"
            while [ $i -lt $max ]; do
              if curl -fsS --connect-timeout 5 --max-time 10 "$url" >/dev/null 2>&1; then 
                echo "$name OK"; return 0
              fi
              i=$((i+1)); sleep 3
            done
            echo "$name FAILED after ${max}s"
            return 1
          }
          
          # Check services but don't fail the workflow if containers aren't running
          services_checked=0
          services_ok=0
          
          # Core and frontend
          if check core http://localhost:8000/status 80; then services_ok=$((services_ok+1)); fi
          services_checked=$((services_checked+1))
          
          if check frontend http://localhost:8080/health 60; then services_ok=$((services_ok+1)); fi
          services_checked=$((services_checked+1))
          
          # MCP services (optional)
          for service_name in "mcp-tts:4004" "mcp-playwright:4005" "mcp-automation:4002" "mcp-automator:4003"; do
            name=$(echo $service_name | cut -d: -f1)
            port=$(echo $service_name | cut -d: -f2)
            if check $name http://localhost:$port/health 60; then services_ok=$((services_ok+1)); fi
            services_checked=$((services_checked+1))
          done
          
          echo "Services status: $services_ok/$services_checked responding"
          
          # Save diagnostic info
          (docker compose ps 2>/dev/null || echo "Docker compose not available") > logs/compose_status.txt 2>&1
          (docker compose logs --no-color --tail=50 2>/dev/null || echo "No container logs available") > logs/compose_all.txt 2>&1

      - name: Start app (configurable)
        run: |
          if [ -n "${START_CMD}" ]; then
            bash -lc "${START_CMD} > logs/app.txt 2>&1 & echo $! > app.pid"
            sleep 5
          else
            echo "START_CMD not set; skipping start"
          fi

      - name: Healthcheck
        run: |
          if [ -n "${HEALTHCHECK_URL}" ]; then
            set -x
            for i in {1..30}; do
              if curl -fsS "${HEALTHCHECK_URL}" > logs/health.txt 2>&1; then
                echo "OK"; exit 0
              fi
              sleep 2
            done
            echo "Healthcheck failed"; exit 1
          else
            echo "HEALTHCHECK_URL not set; skip"
          fi

      - name: Stop app
        if: always()
        run: |
          echo "Cleaning up services..."
          
          # Stop local app if running
          if [ -f app.pid ]; then
            echo "Stopping local app (PID: $(cat app.pid))"
            kill $(cat app.pid) 2>/dev/null || true
            rm -f app.pid
          fi
          
          # Stop Docker containers if compose file exists
          if [ -f docker-compose.yml ]; then
            echo "Stopping Docker Compose stack..."
            if docker compose version >/dev/null 2>&1; then
              docker compose down -v --timeout 30 2>/dev/null || true
              # Also try to stop any atlas-related containers directly
              docker stop $(docker ps -q --filter "name=atlas") 2>/dev/null || true
            else
              echo "Docker Compose not available for cleanup"
            fi
          fi
          
          echo "Cleanup completed"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-logs
          path: logs

  report_failure:
    name: Report failure
    needs: local_macos
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create issue
        uses: actions/github-script@v7
        with:
          script: |
            const {context, github} = require('@actions/github');
            const title = `Post-merge local verification failed: ${context.sha.substring(0,7)}`;
            const body = `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nCheck artifact "local-logs".`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title, body,
              labels: ['post-merge-failure']
            });

  sync_local_repo:
    name: Sync developer working copy
    needs: local_macos
    if: always()
    runs-on: [self-hosted, macOS]
    steps:
      - name: Fast-forward local working copy (optional)
        run: |
          if [ -n "${LOCAL_REPO_PATH}" ] && [ -d "${LOCAL_REPO_PATH}/.git" ]; then
            cd "${LOCAL_REPO_PATH}"
            git remote update
            git checkout main
            git pull --ff-only origin main || true
          else
            echo "LOCAL_REPO_PATH not set or not a git repo; skipping"
          fi
