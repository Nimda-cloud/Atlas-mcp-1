name: Post-merge local verification

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  local_macos:
    name: Local macOS full tests (self-hosted)
    runs-on: [self-hosted, macOS, X64]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Show runner info
        run: |
          sw_vers || true
          uname -a
          python3 --version || true
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies with long timeouts
        run: |
          python -m pip install -U pip
          (python -m pip install -r requirements.txt) || python -m pip install ollama openai fastapi uvicorn aiohttp psutil pydantic python-dotenv pyyaml click pytest pytest-asyncio
      - name: Basic tests
        run: |
          mkdir -p logs
          set -o pipefail
          python -m py_compile atlas_core.py mcp_*.py 2>&1 | tee logs/py_compile.txt
          python test_basic.py 2>&1 | tee logs/test_basic.txt
      - name: Full tests
        continue-on-error: true
        run: |
          set -o pipefail
          python test_atlas.py 2>&1 | tee logs/test_atlas.txt || true
      - name: Docker quick validation
        continue-on-error: true
        run: |
          docker compose config 2>&1 | tee logs/docker_compose_config.txt || true
      - name: K8s dry-run
        continue-on-error: true
        run: |
          kubectl kustomize k8s/overlays/development 2>&1 | tee logs/kustomize_development.txt || true
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-local-logs
          path: logs/**

  report_failure:
    name: Report failure and trigger auto-healing
    runs-on: ubuntu-latest
    needs: [local_macos]
    if: failure()
    steps:
      - name: Create issue for failing post-merge check with auto-healing trigger
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Post-merge local verification failed for ${context.payload.head_commit?.id?.slice(0,7) || context.sha.slice(0,7)}`;
            const body = `🚨 **Post-merge local verification failed** on the self-hosted macOS runner.

            ## Failure Details
            - **Commit**: ${context.sha}
            - **Workflow run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
            - **Artifacts**: post-merge-local-logs (attached to workflow run)

            ## Auto-healing Instructions
            This issue is marked for auto-healing. The Atlas agent should:
            1. Review the attached logs from the failed workflow
            2. Analyze the root cause of the failure
            3. Create a fix PR with the \`automerge\` and \`auto-healing\` labels
            4. Test the fix through the normal CI pipeline
            5. Auto-merge when tests pass
            6. Close this issue when verification succeeds

            ## Manual Review
            If auto-healing fails, manual review may be required:
            - Check logs artifact: post-merge-local-logs
            - Review test failures in the workflow run
            - Ensure dependencies are correctly installed
            - Verify Docker and Kubernetes configurations

            /cc @atlas-agent - Please analyze and fix this issue automatically.
            `;
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'ci', 'auto-healing', 'atlas-agent']
            });
            
            // Add a comment to trigger immediate agent attention
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.data.number,
              body: `🤖 **Atlas Agent**: Please begin auto-healing process for this post-merge verification failure. Priority: HIGH\n\nWorkflow Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
