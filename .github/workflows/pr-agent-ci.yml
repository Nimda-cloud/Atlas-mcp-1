name: PR Agent CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  linux_container_smoke:
    name: Linux container build & smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (if Dockerfile exists)
        run: |
          if [ -f Dockerfile ]; then
            echo "Building Docker image..."
            if timeout 600 docker build -t pr-ci:latest . 2>/dev/null; then
              echo "Docker build successful"
            else
              echo "Docker build failed (non-blocking) - continuing with tests"
            fi
          else
            echo "No Dockerfile, skipping build"
          fi

      - name: Python smoke
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps (progressive fallback)
        run: |
          python -m pip install -U pip
          echo "Installing dependencies on Linux..."
          if [ -f requirements.txt ]; then
            echo "Attempting full requirements.txt installation..."
            if timeout 300 pip install -r requirements.txt; then
              echo "Full requirements installation successful"
            else
              echo "Full requirements failed, trying core packages..."
              pip install ollama openai fastapi uvicorn aiohttp psutil pydantic python-dotenv pyyaml click pytest pytest-asyncio || true
            fi
          else
            echo "No requirements.txt, installing basic test packages..."
            pip install pytest pytest-asyncio || true
          fi
      - name: Quick tests
        run: |
          pytest -q || true

  macos_smoke:
    name: macOS runner smoke
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps (progressive fallback)
        run: |
          python -m pip install -U pip
          echo "Installing dependencies on macOS..."
          if [ -f requirements.txt ]; then
            echo "Attempting full requirements.txt installation..."
            if timeout 300 pip install -r requirements.txt; then
              echo "Full requirements installation successful"
            else
              echo "Full requirements failed, trying core packages..."
              pip install ollama openai fastapi uvicorn aiohttp psutil pydantic python-dotenv pyyaml click pytest pytest-asyncio || true
            fi
          else
            echo "No requirements.txt, installing basic test packages..."
            pip install pytest pytest-asyncio || true
          fi
      - name: Quick tests
        run: |
          pytest -q || true
  merge_pr:
    name: Auto-merge PR (with wait)
    needs: [linux_container_smoke, macos_smoke]
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      contains(github.event.pull_request.labels.*.name, 'automerge') &&
      !github.event.pull_request.draft
    steps:
      - name: Wait until PR is mergeable
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const {owner, repo} = context.repo;
            const maxWaitSec = 120;
            const start = Date.now();
            let lastState = null;

            while (true) {
              const {data} = await github.rest.pulls.get({owner, repo, pull_number: pr.number});
              lastState = data.mergeable_state; // 'clean' | 'dirty' | 'blocked' | 'unstable' | 'unknown' | null
              core.info(`mergeable_state=${lastState}`);
              if (lastState === 'clean' || lastState === 'unstable') break;
              if ((Date.now()-start)/1000 > maxWaitSec) {
                core.setFailed(`PR not mergeable after ${maxWaitSec}s (state=${lastState})`);
                return;
              }
              await new Promise(r => setTimeout(r, 5000));
            }

      - name: Merge (squash) and delete branch
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const {owner, repo} = context.repo;
            await github.rest.pulls.merge({
              owner, repo, pull_number: pr.number,
              commit_title: `Auto-merge PR #${pr.number}: ${pr.title}`,
              commit_message: 'Merged by Atlas MCP CI system',
              merge_method: 'squash'
            });
            core.info('✅ PR merged successfully');
            
            // Trigger firewall-safe K8s workflow after merge
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: 'k8s-firewall-safe.yml',
                ref: 'main',
                inputs: {
                  cleanup: 'true'
                }
              });
              core.info('🚀 Triggered K8s firewall-safe workflow');
            } catch (error) {
              core.warning(`Failed to trigger K8s workflow: ${error.message}`);
            }
              owner, repo, pull_number: pr.number,
              merge_method: 'squash'
      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ github.job }}-${{ github.run_number }}
          path: |
            logs/
            *.log
            requirements.txt