name: PR Agent CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  linux_container_smoke:
    name: Linux container build & smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (if Dockerfile exists)
        run: |
          if [ -f Dockerfile ]; then
            docker build -t pr-ci:latest . || echo "Docker build failed (non-blocking)"
          else
            echo "No Dockerfile, skipping build"
          fi

      - name: Python smoke
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps (best effort)
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt || true
          else
            pip install pytest pytest-asyncio || true
          fi
      - name: Quick tests
        run: |
          pytest -q || true

  macos_smoke:
    name: macOS runner smoke
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps (best effort)
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt || true
          else
            pip install pytest pytest-asyncio || true
          fi
      - name: Quick tests
        run: |
          pytest -q || true
  merge_pr:
    name: Auto-merge PR (with wait)
    needs: [linux_container_smoke, macos_smoke]
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      contains(github.event.pull_request.labels.*.name, 'automerge') &&
      !github.event.pull_request.draft
    steps:
      - name: Wait until PR is mergeable
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const {owner, repo} = context.repo;
            const maxWaitSec = 120;
            const start = Date.now();
            let lastState = null;

            while (true) {
              const {data} = await github.rest.pulls.get({owner, repo, pull_number: pr.number});
              lastState = data.mergeable_state; // 'clean' | 'dirty' | 'blocked' | 'unstable' | 'unknown' | null
              core.info(`mergeable_state=${lastState}`);
              if (lastState === 'clean' || lastState === 'unstable') break;
              if ((Date.now()-start)/1000 > maxWaitSec) {
                core.setFailed(`PR not mergeable after ${maxWaitSec}s (state=${lastState})`);
                return;
              }
              await new Promise(r => setTimeout(r, 5000));
            }
      - name: Merge (squash) and delete branch
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const {owner, repo} = context.repo;
            await github.rest.pulls.merge({
              owner, repo, pull_number: pr.number,
              merge_method: 'squash'
            });
            // delete head branch if it's in same repo
            if (pr.head.repo.full_name === `${owner}/${repo}`) {
              await github.rest.git.deleteRef({owner, repo, ref: `heads/${pr.head.ref}`}).catch(() => {});
            }
