name: PR CI (Agent)

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  label:
    name: Label agent PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Auto-label likely agent PRs
        if: startsWith(github.head_ref, 'copilot-') || startsWith(github.head_ref, 'agent/') || startsWith(github.head_ref, 'copilot-agent/')
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: |
            automerge
            agent

  linux-container:
    name: Linux container build & smoke tests
    runs-on: ubuntu-latest
    needs: label
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          docker build -t atlas-ci -f Dockerfile .
      - name: Run quick tests inside container
        run: |
          docker run --rm -v "$PWD":/app -w /app atlas-ci bash -lc '
            set -e
            python3 -m pip install -U pip
            (timeout 600 pip install -r requirements.txt) || pip install ollama openai fastapi uvicorn aiohttp psutil pydantic python-dotenv pyyaml click pytest pytest-asyncio
            python3 -m py_compile atlas_core.py mcp_*.py
            python3 test_basic.py
          '
      - name: Optional extended tests (non-blocking)
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD":/app -w /app atlas-ci bash -lc '
            timeout 300 python3 test_atlas.py || true
          '

  macos:
    name: macOS runner smoke tests
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          (python -m pip install -r requirements.txt) || python -m pip install ollama openai fastapi uvicorn aiohttp psutil pydantic python-dotenv pyyaml click pytest pytest-asyncio
      - name: Quick tests
        run: |
          python -m py_compile atlas_core.py mcp_*.py
          python test_basic.py
      - name: Optional extended tests (non-blocking)
        continue-on-error: true
        run: |
          python test_atlas.py || true

  automerge:
    name: Auto-merge agent PR
    runs-on: ubuntu-latest
    needs: [linux-container, macos]
    if: >-
      github.event.pull_request.base.ref == 'main'
      && contains(github.event.pull_request.labels.*.name, 'automerge')
    steps:
      - name: Merge PR via GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            // Ensure PR is mergeable
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            if (pr.state !== 'open' || pr.mergeable_state === 'blocked') {
              core.info(`PR #${prNumber} not mergeable yet: state=${pr.state}, mergeable_state=${pr.mergeable_state}`);
              return;
            }
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'squash'
            });
            // Delete branch
            const ref = `heads/${pr.head.ref}`;
            await github.rest.git.deleteRef({ owner: context.repo.owner, repo: context.repo.repo, ref });
