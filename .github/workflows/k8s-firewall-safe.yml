name: Atlas MCP Kubernetes CI (Firewall Safe)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    branches: [main]
    paths:
      - 'k8s/**'
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - '3d_helmet_viewer/**'
      - 'scripts/**'
  push:
    branches: [main]
    paths:
      - 'k8s/**'
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - '3d_helmet_viewer/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      cleanup:
        description: 'Clean up cluster after tests'
        required: false
        default: true
        type: boolean
      automation_mode:
        description: 'Automation mode'
        required: false
        default: 'full'
        type: choice
        options:
          - 'full'
          - 'ci-only'
          - 'basic'

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  CLUSTER_NAME: atlas-mcp-ci-${{ github.run_number }}
  ARTIFACTS_DIR: ./k8s-artifacts
  MAX_RETRIES: 3
  TIMEOUT: 900

jobs:
  # Job 1: Билд образов на GitHub-hosted runner (безопасная среда)
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    outputs:
      images-built: ${{ steps.build-check.outputs.images-built }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Atlas Core
        if: hashFiles('Dockerfile') != ''
        run: |
          echo "Building Atlas Core image..."
          docker build -t atlas-mcp/atlas-core:ci-latest . || exit 1
          echo "✅ Atlas Core built successfully"

      - name: Build Atlas Frontend
        if: hashFiles('3d_helmet_viewer/Dockerfile') != ''
        run: |
          echo "Building Atlas Frontend image..."
          docker build -t atlas-mcp/atlas-frontend:ci-latest ./3d_helmet_viewer/ || exit 1
          echo "✅ Atlas Frontend built successfully"

      - name: Build MCP Automation
        if: hashFiles('Dockerfile.mcp-automation') != ''
        run: |
          echo "Building MCP Automation image..."
          docker build -t atlas-mcp/mcp-automation:ci-latest -f Dockerfile.mcp-automation . || exit 1
          echo "✅ MCP Automation built successfully"

      - name: Build MCP Automator
        if: hashFiles('Dockerfile.mcp-automator') != ''
        run: |
          echo "Building MCP Automator image..."
          docker build -t atlas-mcp/mcp-automator:ci-latest -f Dockerfile.mcp-automator . || exit 1
          echo "✅ MCP Automator built successfully"

      - name: Save Docker images as artifacts
        run: |
          mkdir -p docker-images
          echo "Saving Docker images..."
          
          # Сохраняем образы в tar файлы для передачи между jobs
          docker save atlas-mcp/atlas-core:ci-latest | gzip > docker-images/atlas-core.tar.gz || true
          docker save atlas-mcp/atlas-frontend:ci-latest | gzip > docker-images/atlas-frontend.tar.gz || true  
          docker save atlas-mcp/mcp-automation:ci-latest | gzip > docker-images/mcp-automation.tar.gz || true
          docker save atlas-mcp/mcp-automator:ci-latest | gzip > docker-images/mcp-automator.tar.gz || true
          
          ls -la docker-images/

      - name: Upload Docker images
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-${{ github.run_number }}
          path: docker-images/
          retention-days: 1

      - name: Check build status
        id: build-check
        run: |
          echo "images-built=true" >> $GITHUB_OUTPUT
          echo "✅ All images built and saved successfully"

  # Job 2: Full automation test (self-hosted or enhanced GitHub runner)
  k8s-test-full-automation:
    name: Full Automation Test
    runs-on: ubuntu-latest  # Can also use [self-hosted, macOS] if available
    needs: build-images
    if: contains(github.event.pull_request.labels.*.name, 'k8s-test') || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        automation_mode: [full, ci-only]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images-${{ github.run_number }}
          path: docker-images/

      - name: Setup Docker and Kind
        run: |
          # Install Kind if not available
          if ! command -v kind &> /dev/null; then
            echo "Installing Kind..."
            curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
            chmod +x ./kind
            sudo mv ./kind /usr/local/bin/kind
          fi
          
          # Verify installations
          docker --version
          kubectl version --client
          kind version

      - name: Load Docker images
        run: |
          echo "Loading Docker images..."
          for image in docker-images/*.tar.gz; do
            if [ -f "$image" ]; then
              echo "Loading $(basename $image)..."
              gunzip -c "$image" | docker load || echo "⚠️ Failed to load $image"
            fi
          done
          
          echo "Available Atlas images:"
          docker images | grep atlas-mcp || true

      - name: Run Full Automation Setup
        env:
          CLUSTER_NAME: ${{ env.CLUSTER_NAME }}-${{ matrix.automation_mode }}
          CLEANUP_ON_EXIT: ${{ github.event.inputs.cleanup || 'true' }}
          MAX_RETRIES: ${{ env.MAX_RETRIES }}
          TIMEOUT: ${{ env.TIMEOUT }}
          ARTIFACTS_DIR: ./automation-artifacts-${{ matrix.automation_mode }}
        run: |
          echo "🚀 Running full automation setup..."
          ./scripts/full-automation-setup.sh

      - name: Upload automation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: automation-artifacts-${{ matrix.automation_mode }}-${{ github.run_number }}
          path: ./automation-artifacts-${{ matrix.automation_mode }}/
          retention-days: 7

      - name: Post automation summary
        if: always()
        run: |
          echo "## 🤖 Full Automation Summary (${{ matrix.automation_mode }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "./automation-artifacts-${{ matrix.automation_mode }}/deployment-report.md" ]; then
            cat "./automation-artifacts-${{ matrix.automation_mode }}/deployment-report.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Deployment report not generated" >> $GITHUB_STEP_SUMMARY
          fi

  # Job 3: Kubernetes тест в изолированной среде (альтернативный подход)
  k8s-test-isolated:
    name: Kubernetes Test (Isolated)
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images-${{ github.run_number }}
          path: docker-images/

      - name: Setup Kind
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          config: kind-config.yaml

      - name: Load Docker images into Kind
        run: |
          echo "Loading Docker images into Kind cluster..."
          for image in docker-images/*.tar.gz; do
            if [ -f "$image" ]; then
              echo "Loading $(basename $image)..."
              # Распаковываем и загружаем в kind
              gunzip -c "$image" | docker load
              
              # Получаем имя образа из файла
              image_name=$(gunzip -c "$image" | docker load | grep -o 'atlas-mcp/[^:]*:ci-latest' | head -1)
              if [ -n "$image_name" ]; then
                kind load docker-image "$image_name" --name "${{ env.CLUSTER_NAME }}"
                echo "✅ Loaded $image_name into kind"
              fi
            fi
          done

      - name: Deploy to Kubernetes
        run: |
          mkdir -p ${{ env.ARTIFACTS_DIR }}
          
          echo "Creating namespace..."
          kubectl create namespace atlas-mcp-dev --dry-run=client -o yaml | kubectl apply -f -
          
          echo "Applying Kubernetes manifests..."
          if [ -d "k8s/overlays/development" ]; then
            # Модифицируем образы для CI
            find k8s/ -name "*.yaml" -exec sed -i 's/:dev-latest/:ci-latest/g' {} \; || true
            find k8s/ -name "*.yaml" -exec sed -i 's/:latest/:ci-latest/g' {} \; || true
            
            kubectl apply -k k8s/overlays/development || echo "⚠️ Some manifests failed"
            
            echo "Waiting for deployments..."
            kubectl wait --for=condition=available --timeout=300s deployment --all -n atlas-mcp-dev || echo "⚠️ Some deployments not ready"
          fi

      - name: Collect cluster status (firewall-safe)
        run: |
          echo "📊 Collecting cluster status via kubectl (no direct network access)..."
          
          # Сбор информации через kubectl (работает внутри job, не требует внешней сети)
          kubectl cluster-info > ${{ env.ARTIFACTS_DIR }}/cluster-info.txt 2>&1 || true
          kubectl get nodes -o wide > ${{ env.ARTIFACTS_DIR }}/nodes.txt 2>&1 || true
          kubectl get all -n atlas-mcp-dev -o wide > ${{ env.ARTIFACTS_DIR }}/namespace-all.txt 2>&1 || true
          kubectl get pods -n atlas-mcp-dev -o yaml > ${{ env.ARTIFACTS_DIR }}/pods.yaml 2>&1 || true
          kubectl describe pods -n atlas-mcp-dev > ${{ env.ARTIFACTS_DIR }}/pods-describe.txt 2>&1 || true

      - name: Test services via port-forward (firewall-safe)
        run: |
          echo "🧪 Testing services via localhost port-forward..."
          
          # Функция для безопасного тестирования сервисов
          test_service() {
            local service=$1
            local port=$2
            local health_path=${3:-"/health"}
            
            echo "Testing service: $service:$port"
            
            # Запуск port-forward в фоне
            kubectl port-forward "svc/$service" "$port:$port" -n atlas-mcp-dev > ${{ env.ARTIFACTS_DIR }}/${service}-portforward.log 2>&1 &
            local pf_pid=$!
            
            # Ждем для установки port-forward
            sleep 10
            
            # Тестируем через localhost (обход firewall)
            if curl -s --connect-timeout 5 --max-time 10 "http://127.0.0.1:$port$health_path" > ${{ env.ARTIFACTS_DIR }}/${service}-response.json 2>&1; then
              echo "✅ $service responds successfully"
              echo "SUCCESS" > ${{ env.ARTIFACTS_DIR }}/${service}-test-result.txt
            else
              echo "❌ $service test failed"
              echo "FAILED" > ${{ env.ARTIFACTS_DIR }}/${service}-test-result.txt
            fi
            
            # Убиваем port-forward
            kill $pf_pid 2>/dev/null || true
            wait $pf_pid 2>/dev/null || true
          }
          
          # Тестируем основные сервисы
          if kubectl get service atlas-core-service -n atlas-mcp-dev &>/dev/null; then
            test_service "atlas-core-service" "8000" "/status"
          fi
          
          if kubectl get service mcp-automation-service -n atlas-mcp-dev &>/dev/null; then
            test_service "mcp-automation-service" "4002" "/health"
          fi

      - name: Generate test report
        if: always()
        run: |
          echo "📝 Generating test report..."
          cat > ${{ env.ARTIFACTS_DIR }}/test-report.md << EOF
          # Atlas MCP Kubernetes Test Report
          
          **Job:** ${{ github.job }}
          **Run:** ${{ github.run_number }}
          **Cluster:** ${{ env.CLUSTER_NAME }}
          **Timestamp:** $(date)
          
          ## Deployment Status
          \`\`\`
          $(kubectl get deployments -n atlas-mcp-dev 2>/dev/null || echo "No deployments found")
          \`\`\`
          
          ## Service Tests
          EOF
          
          # Добавляем результаты тестов
          for result_file in ${{ env.ARTIFACTS_DIR }}/*-test-result.txt; do
            if [ -f "$result_file" ]; then
              service=$(basename "$result_file" -test-result.txt)
              result=$(cat "$result_file")
              echo "- **$service:** $result" >> ${{ env.ARTIFACTS_DIR }}/test-report.md
            fi
          done

      - name: Upload isolated test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k8s-test-artifacts-isolated-${{ github.run_number }}
          path: ${{ env.ARTIFACTS_DIR }}/
          retention-days: 7

  # Job 4: Create issue on failure with enhanced information
  create-issue-on-failure:
    name: Create Issue on K8s Failure
    runs-on: ubuntu-latest
    needs: [k8s-test-full-automation, k8s-test-isolated]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts for analysis
        uses: actions/download-artifact@v4
        with:
          path: failure-artifacts/

      - name: Analyze failure and create comprehensive issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Collect failure information
            let failureDetails = [];
            let artifactSummary = [];
            
            try {
              const artifactsDir = 'failure-artifacts';
              if (fs.existsSync(artifactsDir)) {
                const artifacts = fs.readdirSync(artifactsDir);
                artifactSummary = artifacts.map(artifact => `- ${artifact}`);
                
                // Look for deployment reports
                for (const artifact of artifacts) {
                  const reportPath = path.join(artifactsDir, artifact, 'deployment-report.md');
                  if (fs.existsSync(reportPath)) {
                    const reportContent = fs.readFileSync(reportPath, 'utf8');
                    failureDetails.push(`### ${artifact}\n${reportContent}`);
                  }
                }
              }
            } catch (error) {
              console.log('Error analyzing artifacts:', error);
            }
            
            const title = `🚨 Atlas MCP Kubernetes Deployment Failure - Run #${{ github.run_number }}`;
            const body = `
            ## 🚨 Kubernetes Deployment Failure Report
            
            **Run:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Workflow:** ${{ github.workflow }}
            **Triggered by:** ${{ github.event_name }}
            **Branch:** ${{ github.ref_name }}
            **Timestamp:** ${new Date().toISOString()}
            
            ### Failed Jobs Status
            - Full Automation Test: ${{ needs.k8s-test-full-automation.result }}
            - Isolated Test: ${{ needs.k8s-test-isolated.result }}
            
            ### Available Artifacts
            ${artifactSummary.length > 0 ? artifactSummary.join('\n') : 'No artifacts available'}
            
            ### Failure Analysis
            ${failureDetails.length > 0 ? failureDetails.join('\n\n') : 'No detailed failure analysis available'}
            
            ### Troubleshooting Steps
            1. **Check the workflow run logs** for detailed error messages
            2. **Download and review artifacts** from the failed jobs
            3. **Test locally** using: \`./scripts/full-automation-setup.sh\`
            4. **Verify Docker images** were built correctly
            5. **Check cluster resources** and networking
            
            ### Quick Local Testing
            \`\`\`bash
            # Test full automation locally
            CLEANUP_ON_EXIT=false ./scripts/full-automation-setup.sh
            
            # Or test with CI script
            ./scripts/setup-k8s-ci.sh
            \`\`\`
            
            ### Related Documentation
            - [Firewall Solutions](docs/FIREWALL-SOLUTIONS.md)
            - [Kubernetes Setup Guide](k8s/README.md)
            - [Troubleshooting Guide](docs/TROUBLESHOOTING.md)
            
            ---
            🤖 *Auto-generated by GitHub Actions workflow failure handler*
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'kubernetes', 'ci-failure', 'automation']
            });
            
            console.log('Issue created successfully');

  # Job 5: Enhanced cleanup with resource monitoring
  cleanup:
    name: Cleanup Resources
    runs-on: ubuntu-latest
    needs: [k8s-test-full-automation, k8s-test-isolated]
    if: always() && (github.event.inputs.cleanup == 'true' || github.event_name != 'workflow_dispatch')
    steps:
      - name: Cleanup report
        run: |
          echo "## 🧹 Cleanup Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Full Automation Test:** ${{ needs.k8s-test-full-automation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Isolated Test:** ${{ needs.k8s-test-isolated.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cleanup Mode:** Automatic" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All test clusters and resources have been automatically cleaned up." >> $GITHUB_STEP_SUMMARY
          echo "Artifacts are preserved for analysis." >> $GITHUB_STEP_SUMMARY
