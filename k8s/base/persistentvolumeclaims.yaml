apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atlas-data-pvc
  namespace: atlas-mcp
  labels:
    app.kubernetes.io/name: atlas-core
    app.kubernetes.io/part-of: atlas-autonomous-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
