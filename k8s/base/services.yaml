apiVersion: v1
kind: Service
metadata:
  name: atlas-core-service
  namespace: atlas-mcp
  labels:
    app.kubernetes.io/name: atlas-core
    app.kubernetes.io/part-of: atlas-autonomous-system
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: atlas-core
---
