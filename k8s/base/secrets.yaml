apiVersion: v1
kind: Secret
metadata:
  name: atlas-secrets
  namespace: atlas-mcp
  labels:
    app.kubernetes.io/name: atlas-core
    app.kubernetes.io/part-of: atlas-autonomous-system
type: Opaque
data:
  # Base64 encoded values - замініть на реальні значення
  GOOGLE_TTS_API_KEY: ""
  GOOGLE_TTS_LANGUAGE: "dWs="  # "uk" in base64
  GRAFANA_ADMIN_PASSWORD: "YXRsYXNfYWRtaW4="  # "atlas_admin" in base64
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-secret
  namespace: atlas-mcp
  labels:
    app.kubernetes.io/name: atlas-core
    app.kubernetes.io/part-of: atlas-autonomous-system
type: kubernetes.io/dockerconfigjson
data:
  # Base64 encoded Docker registry credentials
  # Створіть через: kubectl create secret docker-registry registry-secret --docker-server=... --docker-username=... --docker-password=... --dry-run=client -o yaml
  .dockerconfigjson: ""
