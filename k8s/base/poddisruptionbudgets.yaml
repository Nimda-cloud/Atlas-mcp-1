apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: atlas-core-pdb
  namespace: atlas-mcp
  labels:
    app.kubernetes.io/name: atlas-core
    app.kubernetes.io/part-of: atlas-autonomous-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-core
