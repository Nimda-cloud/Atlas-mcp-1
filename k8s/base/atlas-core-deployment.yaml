apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-core
  namespace: atlas-mcp
  labels:
    app.kubernetes.io/name: atlas-core
    app.kubernetes.io/part-of: atlas-autonomous-system
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas-core
        app.kubernetes.io/part-of: atlas-autonomous-system
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: registry-secret
      containers:
      - name: atlas-core
        image: atlas-mcp/atlas-core:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: atlas-core-config
        - secretRef:
            name: atlas-secrets
        volumeMounts:
        - name: atlas-data
          mountPath: /app/data
        - name: atlas-logs
          mountPath: /app/logs
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /status
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 10
      volumes:
      - name: atlas-data
        persistentVolumeClaim:
          claimName: atlas-data-pvc
      - name: atlas-logs
        persistentVolumeClaim:
          claimName: atlas-logs-pvc
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - atlas-core
              topologyKey: kubernetes.io/hostname
