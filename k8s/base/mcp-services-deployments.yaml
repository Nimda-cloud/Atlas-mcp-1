apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-automation
  namespace: atlas-mcp
  labels:
    app.kubernetes.io/name: mcp-automation
    app.kubernetes.io/part-of: atlas-autonomous-system
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-automation
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-automation
        app.kubernetes.io/part-of: atlas-autonomous-system
    spec:
      imagePullSecrets:
        - name: registry-secret
      containers:
      - name: mcp-automation
        image: atlas-mcp/mcp-automation:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 4002
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: mcp-automation-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4002
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 4002
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
---
