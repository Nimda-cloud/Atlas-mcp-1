apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-tts
  namespace: atlas-mcp
  labels:
    app.kubernetes.io/name: mcp-tts
    app.kubernetes.io/part-of: atlas-autonomous-system
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-tts
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-tts
        app.kubernetes.io/part-of: atlas-autonomous-system
    spec:
      imagePullSecrets:
        - name: registry-secret
      containers:
      - name: mcp-tts
        image: atlas-mcp/mcp-tts:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 4004
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: mcp-tts-config
        - secretRef:
            name: atlas-secrets
        volumeMounts:
        - name: tts-audio
          mountPath: /data/tts
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4004
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 4004
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
      volumes:
      - name: tts-audio
        persistentVolumeClaim:
          claimName: tts-audio-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-playwright
  namespace: atlas-mcp
  labels:
    app.kubernetes.io/name: mcp-playwright
    app.kubernetes.io/part-of: atlas-autonomous-system
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-playwright
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-playwright
        app.kubernetes.io/part-of: atlas-autonomous-system
    spec:
      imagePullSecrets:
        - name: registry-secret
      containers:
      - name: mcp-playwright
        image: atlas-mcp/mcp-playwright:latest
        imagePullPolicy: Never
        command: ["python"]
        args: ["/app/app.py"]
        ports:
        - containerPort: 4005
          name: http
          protocol: TCP
        env:
        - name: MCP_HOST
          value: "0.0.0.0"
        - name: MCP_PORT
          value: "4005"
        - name: PW_HEADLESS
          value: "true"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4005
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 4005
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
