apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: atlas-mcp
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: atlas-autonomous-system
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'atlas-mcp'
        region: 'local'

    rule_files:
      - "/etc/prometheus/rules/*.yml"

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'atlas-core'
        kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names:
            - atlas-mcp
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          action: keep
          regex: atlas-core-service
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          action: keep
          regex: http
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)

      - job_name: 'atlas-frontend'
        kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names:
            - atlas-mcp
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          action: keep
          regex: atlas-frontend-service
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          action: keep
          regex: http
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
          action: keep
          regex: true

      - job_name: 'mcp-services'
        kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names:
            - atlas-mcp
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          action: keep
          regex: 'mcp-.*-service'
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          action: keep
          regex: http

      - job_name: 'redis'
        static_configs:
          - targets: ['redis-exporter-service:9121']

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
            - atlas-mcp
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: kubernetes_pod_name

    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

  recording_rules.yml: |
    groups:
      - name: atlas.rules
        interval: 30s
        rules:
        - record: atlas:request_rate
          expr: rate(http_requests_total[5m])
        - record: atlas:error_rate
          expr: rate(http_requests_total{status=~"5.."}[5m])
        - record: atlas:cpu_usage
          expr: rate(container_cpu_usage_seconds_total[5m])
        - record: atlas:memory_usage
          expr: container_memory_usage_bytes / container_spec_memory_limit_bytes

  alerting_rules.yml: |
    groups:
      - name: atlas.alerts
        rules:
        - alert: AtlasHighErrorRate
          expr: atlas:error_rate > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High error rate detected"
            description: "Error rate is {{ $value }} errors per second"

        - alert: AtlasHighCPUUsage
          expr: atlas:cpu_usage > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage detected"
            description: "CPU usage is {{ $value }}"

        - alert: AtlasHighMemoryUsage
          expr: atlas:memory_usage > 0.9
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High memory usage detected"
            description: "Memory usage is {{ $value }}"

        - alert: AtlasPodDown
          expr: up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Atlas pod is down"
            description: "Pod {{ $labels.instance }} has been down for more than 1 minute"
