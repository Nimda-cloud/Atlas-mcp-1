apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-ingress
  namespace: atlas-mcp
  labels:
    app.kubernetes.io/part-of: atlas-autonomous-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - atlas.local
    - api.atlas.local
    secretName: atlas-tls-secret
  rules:
  - host: atlas.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: atlas-frontend-service
            port:
              number: 8080
  - host: api.atlas.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: atlas-core-service
            port:
              number: 8000
      - path: /mcp/automation
        pathType: Prefix
        backend:
          service:
            name: mcp-automation-service
            port:
              number: 4002
      - path: /mcp/automator
        pathType: Prefix
        backend:
          service:
            name: mcp-automator-service
            port:
              number: 4003
      - path: /mcp/tts
        pathType: Prefix
        backend:
          service:
            name: mcp-tts-service
            port:
              number: 4004
      - path: /mcp/playwright
        pathType: Prefix
        backend:
          service:
            name: mcp-playwright-service
            port:
              number: 4005
