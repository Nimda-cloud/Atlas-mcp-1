apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: atlas-mcp-dev

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/instance: atlas-mcp
    app.kubernetes.io/managed-by: kustomize
    environment: development
    tier: dev

resources:
- ../../base
- ../../ingress
- ../../monitoring
- ollama-host-service.yaml

# Patches for development environment
patches:
- path: atlas-core-host-ollama-patch.yaml
  target:
    kind: Deployment
    name: atlas-core

# Additional patches (uncomment as needed)
# - path: service-patches.yaml
# - path: configmap-patches.yaml
# - path: secret-patches.yaml

images:
- name: atlas-mcp/atlas-core
  newTag: dev-latest
- name: atlas-mcp/atlas-frontend
  newTag: dev-latest
- name: atlas-mcp/mcp-automation
  newTag: dev-latest
- name: atlas-mcp/mcp-automator
  newTag: dev-latest
- name: atlas-mcp/mcp-tts
  newTag: dev-latest

replicas:
- name: atlas-core
  count: 1
- name: atlas-frontend
  count: 1
- name: mcp-automation
  count: 1
- name: mcp-automator
  count: 1
- name: mcp-tts
  count: 1
- name: mcp-playwright
  count: 1


