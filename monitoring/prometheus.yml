global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'atlas-core'
    static_configs:
      - targets: ['atlas-core:8000', 'atlas-autonomous-system:8000']

  - job_name: 'qdrant'
    metrics_path: /metrics
    static_configs:
      - targets: ['qdrant:6333']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
