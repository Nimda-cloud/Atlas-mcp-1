# Kind configuration for Atlas MCP local development
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: atlas-mcp-dev
networking:
  # Enable host network access for Ollama connectivity
  apiServerAddress: "0.0.0.0"
  apiServerPort: 6443
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  - containerPort: 80
    hostPort: 80
    protocol: TCP
  - containerPort: 443
    hostPort: 443
    protocol: TCP
  - containerPort: 30000
    hostPort: 30000
    protocol: TCP
  - containerPort: 30001
    hostPort: 30001
    protocol: TCP
  - containerPort: 30002
    hostPort: 30002
    protocol: TCP
  # Ollama host port mapping for direct access
  - containerPort: 11434
    hostPort: 11434
    protocol: TCP
- role: worker
  labels:
    tier: worker
