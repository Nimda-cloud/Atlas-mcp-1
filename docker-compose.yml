version: "3.8"
services:
  atlas-core:
    build: .
    container_name: atlas-autonomous-system
    ports:
      - "8000:8000"
    volumes:
      - atlas-data:/app/data
      - atlas-logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      ATLAS_WEB_HOST: 0.0.0.0
      ATLAS_WEB_PORT: "8000"
      ATLAS_LOG_LEVEL: INFO
      ATLAS_DATA_DIR: /app/data
      OLLAMA_URL: http://host.docker.internal:11434
      USE_EMBEDDED_OLLAMA: "${USE_EMBEDDED_OLLAMA:-false}"
      ATLAS_LLM_PROVIDER: ollama
      ATLAS_LLM1_MODEL: "${ATLAS_LLM1_MODEL:-llama3.1:8b}"
      ATLAS_LLM2_MODEL: "${ATLAS_LLM2_MODEL:-llama3.1:8b}"
      ATLAS_LLM3_MODEL: "${ATLAS_LLM3_MODEL:-llama3.1:8b}"
      ATLAS_MCP_SERVERS: automation,macos-automator,tts,playwright
      ATLAS_MCP_TTS_URL: http://mcp-tts:4004
      ATLAS_MCP_PLAYWRIGHT_URL: http://mcp-playwright:4005/mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  atlas-enhanced-frontend:
    build: ./3d_helmet_viewer
    container_name: atlas-enhanced-frontend
    ports:
      - "8080:8080"
    environment:
      - ATLAS_CORE_URL=http://atlas-core:8000
      - TTS_SERVICE_URL=http://mcp-tts:4004
    depends_on:
      atlas-core:
        condition: service_healthy
      mcp-tts:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mcp-automation:
    build:
      context: .
      dockerfile: Dockerfile.mcp-automation
    container_name: atlas-automation-mcp
    ports:
      - "4002:4002"
    environment:
      - MCP_PORT=4002
      - AUTOMATION_LOG_LEVEL=INFO
    restart: unless-stopped
    profiles: ["mcp"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcp-automator:
    build:
      context: .
      dockerfile: Dockerfile.mcp-automator
    container_name: atlas-automator-mcp
    ports:
      - "4003:4003"
    environment:
      - MCP_PORT=4003
      - MACOS_AUTOMATOR_ENABLED=true
    restart: unless-stopped
    profiles: ["mcp", "macos"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcp-playwright:
    image: mcr.microsoft.com/playwright/mcp:latest
    container_name: atlas-mcp-playwright
    command: ["--port", "4005", "--host", "0.0.0.0", "--headless", "--browser", "chromium", "--no-sandbox"]
    ports:
      - "4005:4005"
    restart: unless-stopped
    profiles: ["mcp"]

  mcp-tts:
    build: ./services/tts_mcp_adapter
    container_name: atlas-tts-mcp
    ports:
      - "4004:4004"
    environment:
      - MCP_PORT=4004
      - TTS_PROVIDERS=${TTS_PROVIDERS:-google_tts,ukrainian_tts}
      - TTS_DEFAULT_PROVIDER=${TTS_DEFAULT_PROVIDER:-google_tts}
      - GOOGLE_TTS_API_KEY=${GOOGLE_TTS_API_KEY}
      - GOOGLE_TTS_LANGUAGE=${GOOGLE_TTS_LANGUAGE}
      - ATLAS_TTS_LANG=${ATLAS_TTS_LANG:-uk}
      - TTS_OUTPUT_DIR=/data/tts
      - UK_TTS_DEVICE=${UK_TTS_DEVICE:-cpu}
      - UK_TTS_PREFERRED_FORMAT=${UK_TTS_PREFERRED_FORMAT:-wav}
    volumes:
      - atlas-tts-audio:/data/tts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    ports:
      - "6379:6379"
    volumes:
      - atlas-redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: atlas-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    profiles: ["monitoring"]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: atlas-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - atlas-qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: atlas-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - atlas-prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:latest
    container_name: atlas-grafana
    ports:
      - "3000:3000"
    volumes:
      - atlas-grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=atlas_admin
    restart: unless-stopped
    profiles: ["monitoring"]

volumes:
  atlas-data:
    driver: local
  atlas-logs:
    driver: local
  atlas-redis-data:
    driver: local
  atlas-qdrant-data:
    driver: local
  atlas-prometheus-data:
    driver: local
  atlas-grafana-data:
    driver: local
  atlas-tts-audio:
    driver: local

networks:
  default:
    name: atlas-network
    driver: bridge
