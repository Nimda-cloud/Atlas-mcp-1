version: '3.8'

services:
  atlas-core:
    build: .
    container_name: atlas-autonomous-system
    ports:
      - "8000:8000"   # Web interface
      - "11434:11434" # Ollama API
    volumes:
      - atlas-data:/app/data
      - atlas-logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock  # For container management
    environment:
      - ATLAS_WEB_HOST=0.0.0.0
      - ATLAS_WEB_PORT=8000
      - ATLAS_LOG_LEVEL=INFO
      - ATLAS_DATA_DIR=/app/data
      - OLLAMA_HOST=0.0.0.0:11434
      - ATLAS_MCP_SERVERS=automation,macos-automator,tts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # MCP Automation Server
  mcp-automation:
    image: ghcr.io/atlas/automation-mcp:latest
    container_name: atlas-automation-mcp
    ports:
      - "4002:4002"
    environment:
      - MCP_PORT=4002
      - AUTOMATION_LOG_LEVEL=INFO
    restart: unless-stopped
    profiles: ["mcp"]

  # macOS Automator MCP Server  
  mcp-automator:
    image: ghcr.io/atlas/macos-automator-mcp:latest
    container_name: atlas-automator-mcp
    ports:
      - "4003:4003"
    environment:
      - MCP_PORT=4003
      - MACOS_AUTOMATOR_ENABLED=true
    restart: unless-stopped
    profiles: ["mcp", "macos"]

  # TTS MCP Server
  mcp-tts:
    image: ghcr.io/atlas/tts-mcp:latest
    container_name: atlas-tts-mcp
    ports:
      - "4004:4004"
    environment:
      - MCP_PORT=4004
      - TTS_PROVIDERS=say_tts,openai_tts,elevenlabs_tts,google_tts,coqui_tts
      - COQUI_TTS_BASE_URL=http://coqui-tts:5002
    depends_on:
      - coqui-tts
    restart: unless-stopped
    profiles: ["mcp", "tts"]

  # Local Coqui TTS Server
  coqui-tts:
    image: ghcr.io/coqui-ai/tts-cpu:latest
    container_name: atlas-coqui-tts
    ports:
      - "5002:5002"
    command: ["python3", "TTS/server/server.py", "--model_name", "tts_models/en/vctk/vits"]
    restart: unless-stopped
    profiles: ["tts"]

  # Redis for memory and caching
  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    ports:
      - "6379:6379"
    volumes:
      - atlas-redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # Qdrant vector database for RAG memory
  qdrant:
    image: qdrant/qdrant:latest
    container_name: atlas-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - atlas-qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: atlas-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - atlas-prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    profiles: ["monitoring"]

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: atlas-grafana
    ports:
      - "3000:3000"
    volumes:
      - atlas-grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=atlas_admin
    restart: unless-stopped
    profiles: ["monitoring"]

volumes:
  atlas-data:
    driver: local
  atlas-logs:
    driver: local
  atlas-redis-data:
    driver: local
  atlas-qdrant-data:
    driver: local
  atlas-prometheus-data:
    driver: local
  atlas-grafana-data:
    driver: local

networks:
  default:
    name: atlas-network
    driver: bridge